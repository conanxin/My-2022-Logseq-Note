;,[954,logseq____&quot;^Xlogseq____&quot;,500,536870951]],[logseq____&quot;^15logseq____&quot;,[954,logseq____&quot;^Vlogseq____&quot;,500,536870951]],[logseq____&quot;^15logseq____&quot;,[954,logseq____&quot;^Ulogseq____&quot;,231,536870951]],[logseq____&quot;^15logseq____&quot;,[954,logseq____&quot;^Ulogseq____&quot;,500,536870951]],[logseq____&quot;^15logseq____&quot;,[954,logseq____&quot;^Ulogseq____&quot;,548,536870951]],[logseq____&quot;^15logseq____&quot;,[954,logseq____&quot;^Hlogseq____&quot;,231,536870951]],[logseq____&quot;^15logseq____&quot;,[954,logseq____&quot;^Hlogseq____&quot;,548,536870951]],[logseq____&quot;^15logseq____&quot;,[954,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u6a33ef0b-13c3-4d04-b10d-5ec174af1734logseq____&quot;,536870951]],[logseq____&quot;^15logseq____&quot;,[955,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;单纯的去中心化互联网并不能使其凌驾于政治之上，也不能使其免于被企业收编。\\n\\n关于网络的传统观点认为，网络的政治性可以被简化为网络的集中化程度：一个中心化（centralized）的网络是为控制而设计的，而一个去中心化（decentralized）或分布式（distributed）的网络是民主的。互联网的早期拥护者认为，它的结构使其去中心化（decentralized），其去中心化将保护其免受垄断。1999年，万维网的发明者蒂姆·伯纳斯-李（Tim Berners-Lee ）写道，互联网“如此庞大，任何一家公司都不可能主宰它。”（is so huge that there’s no way any one company can dominate it）\\n\\n那么，从一开始，人们显然对互联网是什么存在误解：其最大的支持者认为，在赋予个人新的信息分享和生产工具的同时，它将免受企业或国家的控制。但是这种观点总是被自由意志主义的理想主义所笼罩。正如乔安妮·麦克尼尔（Joanne McNeil）在《Lurking》中写道，\\logseq____&quot;让我一度怀念的互联网\\logseq____&quot;（the internet I felt momentarily nostalgic for）——人们在聊天室和论坛上聚集在一起，进行不受政治、社会分歧或经济压力影响的讨论——\\logseq____&quot;是一个从未实际存在过的互联网。\\logseq____&quot;（is an internet that never actually existed.）\\n\\n虽然从技术上讲，今天没有一家公司主宰互联网，但云服务、海底电缆和其他为其提供动力的基础设施越来越集中于一小部分电信集团和网络主导平台：亚马逊、谷歌、微软和Facebook。回顾20世纪90年代的互联网，私营公司的力量已经很明显。尽管互联网的基础设施直到1995年才完全私有化，但在线互动已经受到了商业压力的影响。1994年，卡门·埃莫西约（Carmen Hermosillo）发表了一篇关于在线社区的有影响力的文章，认为 \\logseq____&quot;许多网络社区都是依赖于人类互动商品化的企业\\logseq____&quot;（many cyber-communities are businesses that rely upon the commodification of human interaction）。卡门·埃莫西约（Carmen Hermosillo）解释说，尽管 \\logseq____&quot;有些人把网络空间写得好像是60年代的乌托邦\\logseq____&quot;（some people write about cyberspace as though it were a ’60s utopia），但早期的网络服务——美国在线（America Online）、Prodigy、CompuServe，甚至Whole Earth logseq____&apos;Lectronic Link（WELL）——都是把用户的行为变成产品的企业，通过审查和编辑来塑造用户的互动，以服务于企业目标，并保持永久记录，使网络空间\\logseq____&quot;成为日益有效的监控工具\\logseq____&quot;（an increasingly efficient tool of surveillance）。卡门·埃莫西约（Carmen Hermosillo）认为，与《连线》的支持者相反，电子社区受益于 \\logseq____&quot;我们社会中的非人性化趋势：它想把人与人之间的互动商品化，享受奇观，而不考虑人的代价\\logseq____&quot;。（trend towards dehumanization in our society: It wants to commodify human interaction, enjoy the spectacle regardless of the human cost.）\\n\\n卡门·埃莫西约（Carmen Hermosillo）并不是唯一反对网络空间的自由主义框架的声音。1996年，技术历史学家詹妮弗·S·莱特（Jennifer S. Light）将“网络乐观主义者”（cyberoptimists）对虚拟社区的谈论与城市规划者早期对购物中心的乐观预测进行了比较。20世纪50年代，随着汽车在美国城市的扩张，规划者承诺，购物中心将成为封闭的公共空间，以取代主街道。但正如詹妮弗·S·莱特（Jennifer S. Light）所指出的，向郊区购物中心的过渡带来了新的不平等，并限制了空间的功能，只服务于商业利益。同样，在私人所有的虚拟社区中，\\logseq____&quot;这些集市只在商业意义上起作用；市场空间作为城市生活场所的意义受到严格的控制\\logseq____&quot;（these agora function only in their commercial sense; the sense of the market space as site for civic life is subject to strict controls.）。商业\\logseq____&quot;社区\\logseq____&quot;优先考虑商业利益，而不是促进边缘化声音的参与、促进教育和富有成效的交流，以及促进数字空间的民主治理。\\n\\n詹妮弗·S·莱特（Jennifer S. Light）提供了Prodigy的例子，她说Prodigy是一个\\logseq____&quot;电子全景\\logseq____&quot;（electronic panopticon），监控公共帖子，对不适合家庭的帖子进行审查，并根据收集到的用户信息向他们提供\\logseq____&quot;持续的广告\\logseq____&quot;。当然，这些同样的问题仍然是商业通信平台的特点。如果说有什么不同的话，后互联网泡沫时代将网络货币化的做法使情况变得更糟。2005年，提姆·奥莱理（Tim Ologseq____&apos;Reilly）将\\logseq____&quot;Web 2.0 \\logseq____&quot;恰当地描述为有效的网络平台，将所有形式的在线互动封闭起来，这样用户所做的一切都可以被捕捉和分类，为企业带来收益。\\n\\n在不到20年的时间里，就像詹妮弗·S·莱特（Jennifer S. Light）警告的那样，一小部分公司开始监督我们的许多在线互动，并决定其形式以服务于他们的利益。正如推特用户@tveastman在2018年开玩笑说：\\logseq____&quot;我年纪够大了，还记得互联网还不是由五个网站——每个网站都由另外四个网站的文本截图组成——组成的时代。\\logseq____&quot;（Ilogseq____&apos;m old enough to remember when the Internet wasnlogseq____&apos;t a group of five websites, each consisting of screenshots of text from the other four.）\\n\\n然而近年来，我们已经开始看到让这些公司占据主导地位的模式出现了裂痕：数字广告一直是补贴那些带来用户的网站、服务和平台的关键，现在却面临威胁。这在一定程度上是因为加大了阻碍行业对用户监控的力度：苹果最近推出了一些功能来阻止针对iOS设备的广告，尤其是Facebook将其视为一个巨大的威胁。数字广告的有效性总体上也受到了质疑。\\logseq____&quot;广告欺诈\\logseq____&quot;，或者说是关注度指标的不正当手法引诱（通常通过使用机器人），被认为是猖獗的，宝洁和优步等公司分别削减了1亿美元的广告支出，但对其收入增长没有什么明显影响。\\n\\n数字广告模式的脆弱性提供了一个机会，让我们想象一种不同的网络，植根于另一种政治议程；一种将社会利益提升到企业利润之上的网络。但这不会自动发生。如果不采取协调一致的行动来建设一个更好的互联网，摆脱数字广告可能只会让我们的网络互动进一步货币化。所谓的创作者经济正在重新强调小额支付和订阅模式，主流社交媒体平台也纷纷效仿，推出了新的盈利功能，如Twitter的超级粉丝和Facebook的Bulletin。除了新的应用程序和服务之外，人们还在努力将盈利基础设施嫁接到互联网本身：Web3，德鲁·奥斯汀（Drew Austin）将其描述为\\logseq____&quot;一个基于区块链的互联网，它不太像一个流通‘免费信息’的开放网络，而更像一个内置所有权和支付基础设施的扩展矩阵。\\logseq____&quot;（a blockchain-based internet that works less like an open network circulating ‘free information’ and more like an expansive matrix of built-in ownership and payment infrastructure.）\\n\\n在创作者方面，这些技术为那些还没有大量受众的人提供了虚假的承诺。对于艺术家和表演者来说，创作者经济更加不平等，因为平台推动了明星经济，使职业中的\\logseq____&quot;中产阶级\\logseq____&quot;变得空洞。一小部分拥有大量粉丝的人可以利用这些新工具创造更多收入，而大量的人则只能靠病毒式传播赚钱。同时，货币化的特点使互联网总体上更加不平等，将访问权与个人的支付能力联系起来，并使侵入性的个人商品化形式普遍化，我们都被激励着将自己变成产品。\\n\\n但在一些圈子里，人们希望Web3能重现早期互联网失去的去中心化的承诺。加密爱好者和数字权利领域的一些积极分子断言，加密货币、区块链、智能合约和相关技术将规避国家的监管权力，并允许人们避开大银行等掠夺性中介机构。然而，他们低估了这些技术已经变得多么集中化，也没有解释自由主义者对去中心化的呼吁将如何避免像互联网那样被类似的企业占领。\\n\\nWeb3是一个技术解决方案，它与现实世界中的权力分配方式并不矛盾。它的目标不是创造一个更公平的社会网络化手段；相反，它试图预先阻止实现这一目标实际需要的政治斗争。像其他\\logseq____&quot;去中心化\\logseq____&quot;的概念一样，它很容易被收编。硅谷的亿万富翁们已经公开称赞加密货币是一种右翼技术，而亚马逊最近推出了自己的\\logseq____&quot;分布式\\logseq____&quot;网络，由自己的产品组成。比特币的基础设施由少数几家大公司控制，就像谷歌将数字广告市场金融化一样，Web3试图将金融化的逻辑扩展到更多的数字互动中。\\n\\n对去中心化的呼吁往往不能与权力结构相抗衡，这些权力结构可能会控制所谓的解放性项目。在《你的电脑着火了》（Your Computer Is on Fire）一文中，本杰明·彼得斯（Benjamin Peters）认为，\\logseq____&quot;网络并不像它们的设计那样，而是模仿了试图建立它们的组织协作和恶习。\\logseq____&quot;（networks do not resemble their designs so much as they take after the organizational collaborations and vices that tried to build them.）换句话说，只关注网络设计会错过政治理想和制度实践，这些政治理想和制度实践孕育了它们，并已经融入其中。例如，虽然任何人仍然可以将自己的服务器连接到互联网上，但基础设施越来越多地被科技巨头所控制，这些巨头将我们在网络上的活动封闭起来，我们使用其服务来访问网络。更不用说，所谓的去中心化并没有阻止美国国家安全局或谷歌和Facebook等公司对我们在网上做的几乎所有事情的大规模监控。\\n\\n去中心化本身并不是一种政治。如果没有一个明确地寻求为公众服务、同时挑战企业权力的政治，去中心化就不是一个实际的策略，无法将我们的在线互动去商品化，也无法将我们的网络重新定位为其他目的。\\n\\n早期网络的自由主义推动者将个人黑客视为挑战国家权力和实现互联网自由潜力的关键，即便是在企业巨头接管互联网的时候。今天，我们听到的是个人创造者，利用整合后的互联网提供的机会，让我们为平台公司创造盈利的内容。但个人行动永远不会产生解放性的网络空间。这将需要国家采取行动，在有组织的公众（要求技术为人民服务）的推动下，资助和建立替代方案。\\n\\n除了迷恋去中心化，还有另一种选择。20世纪由国家推动的通信项目的历史，提供了如何以不同的方式和政治手段处理网络的例子。\\n\\n一般来说，互联网的历史始于1969年，第一台计算机连接到阿帕网（ARPANET）。阿帕网是由美国国防部资助的早期分组交换网络，将各大学的研究中心连接起来。但正如彼得斯（Peters）在《如何不把一个国家网络化：苏联互联网令人不安的历史》（How Not to Network a Nation: The Uneasy History of the Soviet Internet）中所描述的那样，第一个建立全国民用计算机网络的提议是在1959年苏联提出的，当时苏联控制论先驱阿纳托利·基托夫（Anatoly Kitov）提出了经济自动化管理系统来帮助协调计划经济。该网络本来是分层设计的，但基托夫还赋予了工人提供反馈和批评的能力，从而使他们对计划过程有更大的影响。这个项目被苏联的官僚机构扼杀，但如果基托夫的设想得以实现，工人的参与将为民用网络时代带来一个非常不同的开端，它将围绕经济规划而不是学术界的知识传播展开。\\n\\n智利在社会主义总统萨尔瓦多·阿连德（Salvador Allende）领导下制定的Cybersyn项目，有着类似的经济方向，但采取了不同的方法。正如伊登·梅迪纳（Eden Medina）在《控制论革命者：阿连德时代智利的技术与政治》（Cybernetic Revolutionaries: Technology and Politics in Allendelogseq____&apos;s Chile）一书中所解释的那样，这是一个明确的尝试，旨在摆脱美国等强国的\\logseq____&quot;技术殖民主义\\logseq____&quot;，\\logseq____&quot;这种殖民主义迫使智利人使用适合富裕国家需求和资源的技术，同时阻止替代的、本地形式的知识和物质生活的繁荣。\\logseq____&quot;。它的开发者试图通过寻求工人的反馈，保持工厂的自治，以及建立一个没有技术能力的人也能使用的指挥中心，使它充满左翼政府的政治色彩。政府希望在将关键行业国有化的过程中使用该网络来协调生产，但我们永远不会知道它在实践中会如何运作，因为阿连德在1973年被中央情报局支持的政变推翻了。梅迪纳断言，该项目证明了，政治过程本身可以指导网络的设计，而不是网络本身具有内在的政治，创新可以发生在市场竞争的范围之外。\\n\\n另一个选择是Minitel系统，它是在法国总统瓦莱里·吉斯卡尔·德斯坦（Valéry Giscard dlogseq____&apos;Estaing）1974年宣布\\logseq____&quot;对法国来说，美国在电信和计算机的统治是对其独立的威胁\\logseq____&quot;之后，法国开发了Minitel系统。正如朱利安·梅兰德（Julien Mailland）和凯文·德里斯科尔（Kevin Driscoll）在《Minitel：欢迎来到互联网》（Minitel: Welcome to the Internet）一书中详细描述的那样，这个于20世纪80年代推出的系统采用了“混合网络设计，部分集中和封闭，部分分散和开放”（hybrid network design, part centralized and closed, part decentralized and open）。虽然国家电话公司控制着网络的中心，但网络的边缘——存储私人服务的服务器——则由私人公司管理。它的设计中也有货币化的内容。当用户连接到一项服务（用户可以访问新闻、游戏、体育更新、时事留言板等等）时，他们每访问一分钟就要付费，这为服务提供商和电话公司创造了收入来源，电话公司从中抽成。这种商业模式激励公司尽可能长时间地让人们使用他们的服务，而不必求助于广告或跟踪。事实上，Minitel有一定的隐私；当用户收到账单时，它不会识别使用了哪些服务。\\n\\n朱利安·梅兰德（Julien Mailland）和凯文·德里斯科尔（Kevin Driscoll）将Minitel与苹果的App Store进行了比较，后者由一个集中的权威机构管理“平台”并维护标准。但与Minitel不同的是，Minitel的决定“要经过适当的程序，并可以向法院提起上诉，而苹果公司对在其平台上发生的行为进行绝对控制。公众没有利益，没有代表，也没有办法解决争端。”（were subject to due process and could be appealed in a court of law, Apple exercises absolute control over the communication that takes place on its platform. The public has no interest, no representation, and no recourse to settle disputes.）换句话说，因为Minitel是由国家电话公司经营的，因此通过赋予公民这些权利的立法以及通过代议制民主制度，都有公共问责制。\\n\\n这些早期的网络项目——特别是Cybersyn和Minitel项目——是阻止技术帝国主义的明确努力。此后几年，互联网的全球化阻碍了这种愿望的实现。大多数政府只能对不同的政治网络进行推测，因为他们的公民已经使用的全球网络似乎超出了美国以外任何国家的监管范围。\\n\\n最引人注目的例外是中国，那里的“防火墙”正在发挥作用。这一系列技术和立法通常仅仅是为了限制中国民众获取敏感信息或就有争议的话题进行交流——这无疑是事实，也是一个问题——但其经济影响可能更重要。中国的保护主义措施，加上慷慨的国家资助，使其能够发展出一个与美国相媲美的国内科技产业——这是其他国家正在寻求模仿的。\\n\\n研究员胡安·奥尔蒂斯·弗鲁勒（Juan Ortiz Freuler）认为，如果全球发展中国家继续被美国公司榨取它们创造的价值，它们将对中国的模式更加开放。这加剧了人们对互联网沿国界线瓦解的担忧——即所谓的\\logseq____&quot;分裂网络\\logseq____&quot;（splinternet）。但胡安·奥尔蒂斯·弗鲁勒（Juan Ortiz Freuler）认为，分裂的趋势不仅是初露端倪，而且已经发生——只是沿着平台分裂而不一定是国界线。在封闭的在线活动中，像谷歌和Facebook等公司限制数据的公开传输和服务的互操作性，以巩固其主导地位。对\\logseq____&quot;分裂网络\\logseq____&quot;（splinternet）的回应不是确保互联网的优势，而是探索替代方案——以及支持这些方案的替代政治。\\n\\n为公共利益服务的技术很可能不会出现在中美技术冷战的任何一方。在20世纪的冷战期间，120个国家拒绝在美国资本主义或苏联共产主义之间做出选择，奥尔蒂斯·弗罗伊勒（Ortiz Freuler）呼吁开展一场数字不结盟运动，以建立\\logseq____&quot;面向解决我们作为人类在这个星球上面临的重大挑战\\logseq____&quot;（geared toward solving the big challenges we face as humans on this planet）的信息系统，包括气候危机和全球不平等。他认为，我们的社会、环境和技术救赎不会在发达国家中找到，他们的文化\\logseq____&quot;与孕育资本主义本身的理性交织在一起\\logseq____&quot;。然而，发展中国家有创造不同系统的想象力，因为它 \\logseq____&quot;看到自己的文化被殖民主义摧毁，只是看到它的碎片被重新组合成一个新的叙事，有利于它的新统治者。\\logseq____&quot; 这并不是要把解决发达国家所造成问题的责任放在它所压迫的人身上，但他们很可能会有一个独特的方法来结束美国技术的主导地位——并拒绝中国技术的替代。我们可以将奥尔蒂斯·弗罗伊勒（Ortiz Freuler）的呼吁扩大到包括发达国家被压迫的人民——那些受到技术系统监视和控制的人，这些技术系统不断扩大，覆盖了生活的更多领域。\\n\\n正如中国的例子所表明的那样，要让替代方案茁壮成长，很可能需要对现有的平台进行阉割，无论是通过阻止它们，还是采取政策拆除它们的“围墙花园”。我们还应该认识到国家控制基础设施的重要性，以及这种控制如何使公共实体能够影响网络结果。这种实验可以有很多形式，但其中一个例子可以在丹·亨德（Dan Hind）关于英国数字合作（British Digital Cooperative）的建议中找到，它包括一个没有广告压力的通信平台，旨在促进对社会有益的互动形式，以及社区技术中心，这些中心教育当地人并开发技术以满足他们的需求。但是，我们是否也可以想象，智利正着手修改其独裁时代的宪法，它能否重新点燃\\logseq____&quot;Project Cybersyn\\logseq____&quot;的反帝国技术精神？或者古巴从其生物制药的成功中学习，重新想象数字网络应该如何为社会主义社会服务，而不是屈服于美国科技巨头的霸权？甚至是巴西，再次在卢拉·达·席尔瓦（Lula da Silva）的领导下，领导一个联盟来建立为发展中国家服务的技术？\\n\\n在评论了我们如何将早期网络理想化之后，麦克尼尔（McNeil）写道：\\logseq____&quot;当我怀旧于社交媒体整合之前的互联网时，我实际上是在渴望一个更好的互联网，一个尚未形成的互联网社区。\\logseq____&quot;。（when I think I feel nostalgic for the internet before social media consolidation, what I am actually experiencing is a longing for an internet that is better, for internet communities that haven’t come into being yet）显然，这不仅仅是去中心化的问题；这是在思考我们希望看到的结果，并建立制度——以及随后的技术——以服务于这些政治目标。与其希望一个特定的网络设计能够免受企业控制，不如先建立必要的政治力量，使之成为现实，从而建设一个更好的互联网。logseq____&quot;,536870951]],[logseq____&quot;^15logseq____&quot;,[955,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870951]],[logseq____&quot;^15logseq____&quot;,[955,logseq____&quot;^Flogseq____&quot;,954,536870951]],[logseq____&quot;^15logseq____&quot;,[955,logseq____&quot;^Xlogseq____&quot;,500,536870951]],[logseq____&quot;^15logseq____&quot;,[955,logseq____&quot;^Vlogseq____&quot;,500,536870951]],[logseq____&quot;^15logseq____&quot;,[955,logseq____&quot;^Ulogseq____&quot;,500,536870951]],[logseq____&quot;^15logseq____&quot;,[955,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u6a33ef0b-9375-468c-9870-91925e458770logseq____&quot;,536870951]],[logseq____&quot;^15logseq____&quot;,[957,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;logseq____&quot;,536870952]],[logseq____&quot;^15logseq____&quot;,[957,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870952]],[logseq____&quot;^15logseq____&quot;,[957,logseq____&quot;^Flogseq____&quot;,23,536870952]],[logseq____&quot;^15logseq____&quot;,[957,logseq____&quot;^Xlogseq____&quot;,23,536870952]],[logseq____&quot;^15logseq____&quot;,[957,logseq____&quot;^Vlogseq____&quot;,23,536870952]],[logseq____&quot;^15logseq____&quot;,[957,logseq____&quot;^Ulogseq____&quot;,23,536870952]],[logseq____&quot;^15logseq____&quot;,[957,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u6a33ef0b-d4a3-42af-aa7c-ec55fa58b741logseq____&quot;,536870952]],[logseq____&quot;^15logseq____&quot;,[958,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;logseq____&quot;,536870952]],[logseq____&quot;^15logseq____&quot;,[958,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870952]],[logseq____&quot;^15logseq____&quot;,[958,logseq____&quot;^Flogseq____&quot;,957,536870952]],[logseq____&quot;^15logseq____&quot;,[958,logseq____&quot;^Xlogseq____&quot;,23,536870952]],[logseq____&quot;^15logseq____&quot;,[958,logseq____&quot;^Vlogseq____&quot;,23,536870952]],[logseq____&quot;^15logseq____&quot;,[958,logseq____&quot;^Ulogseq____&quot;,23,536870952]],[logseq____&quot;^15logseq____&quot;,[958,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u6a33ef0b-af6d-444d-ae7a-2787d9eb5006logseq____&quot;,536870952]]]]]]"</script>
